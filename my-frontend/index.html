<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Create Your Account</title>
    <meta name="description" content="Create a new account to get started.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #090a0f;
            --bg-card: #15161e;
            --bg-input: #111218;
            --border-color: #22242f;
            --border-focus: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #858b9c;
            --text-muted: #5f6677;
            --color-purple: #8b5cf6;
            --gradient-primary: linear-gradient(90deg, #d946ef 0%, #8b5cf6 100%);
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .signup-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 20px;
            font-weight: 700;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Status message */
        .status-msg {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .status-msg.success {
            background-color: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .status-msg.error {
            background-color: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* Password strength bar */
        .strength-bar-wrap {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .strength-segment {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background-color: var(--border-color);
            transition: background-color 0.3s ease;
        }

        .strength-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: var(--transition);
        }

        .submit-btn:hover {
            opacity: 0.92;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.35);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .login-row {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-row a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
        }

        .login-row a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="signup-card">

        <div class="logo-row">
            <div class="logo-icon">A</div>
            <span class="logo-name">MyApp</span>
        </div>

        <h1>Create an account</h1>
        <p class="subtitle">Sign up and start using MyApp today.</p>

        <!-- Status Message -->
        <div class="status-msg" id="status-msg"></div>

        <!-- Signup Form -->
        <form id="signup-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. john_doe" autocomplete="username"
                    maxlength="30" required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="e.g. +1234567890" autocomplete="tel"
                    maxlength="15" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters"
                    autocomplete="new-password" required>
                <!-- Strength indicator -->
                <div class="strength-bar-wrap">
                    <div class="strength-segment" id="seg-1"></div>
                    <div class="strength-segment" id="seg-2"></div>
                    <div class="strength-segment" id="seg-3"></div>
                    <div class="strength-segment" id="seg-4"></div>
                </div>
                <div class="strength-label" id="strength-label"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Create Account</button>
        </form>

        <div class="divider">or</div>

        <div class="login-row">
            Already have an account? <a href="login.html">Sign in</a>
        </div>

    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const segments = [
            document.getElementById('seg-1'),
            document.getElementById('seg-2'),
            document.getElementById('seg-3'),
            document.getElementById('seg-4'),
        ];
        const strengthLabel = document.getElementById('strength-label');
        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');

        // ── Password strength meter ──────────────────────
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
        const LABELS = ['Weak', 'Fair', 'Good', 'Strong'];

        function getStrength(pwd) {
            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd) || /[^A-Za-z0-9]/.test(pwd)) score++;
            return score; // 0–4
        }

        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            const score = pwd.length === 0 ? 0 : Math.max(getStrength(pwd), 1);

            segments.forEach((seg, i) => {
                seg.style.backgroundColor = i < score ? COLORS[score - 1] : '';
            });
            strengthLabel.textContent = pwd.length === 0 ? '' : LABELS[score - 1];
            strengthLabel.style.color = pwd.length === 0 ? '' : COLORS[score - 1];
        });

        // ── Status message helper ────────────────────────
        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = `status-msg ${type}`;
        }

        // ── Form submit → POST /signup ───────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = passwordInput.value;

            if (!username || !mobile || !password) {
                return showStatus('Please fill in all fields.', 'error');
            }
            if (!/^[+\d]{7,15}$/.test(mobile)) {
                return showStatus('Enter a valid mobile number (7–15 digits).', 'error');
            }
            if (password.length < 6) {
                return showStatus('Password must be at least 6 characters.', 'error');
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account…';

            try {
                const res = await fetch('http://localhost:3000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, mobile, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    showStatus(`Account created! Welcome, ${data.user?.username || username} 🎉`, 'success');
                    form.reset();
                    segments.forEach(s => (s.style.backgroundColor = ''));
                    strengthLabel.textContent = '';
                } else {
                    showStatus(data.message || 'Signup failed. Please try again.', 'error');
                }
            } catch {
                showStatus('Cannot reach the server. Make sure server.js is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
