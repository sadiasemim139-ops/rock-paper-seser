<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media.io - Free AI Music Generator from Text</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #090a0f;
            --bg-nav: #0d0e12;
            --bg-sidebar: #0d0e12;
            --bg-card: #15161e;
            --bg-input: #111218;
            --border-color: #22242f;
            --text-primary: #ffffff;
            --text-secondary: #858b9c;
            --text-muted: #5f6677;
            --color-purple: #8b5cf6;
            --color-blue: #3b82f6;
            --color-pink: #d946ef;
            --color-green: #10b981;
            --gradient-primary: linear-gradient(90deg, #d946ef 0%, #8b5cf6 100%);
            --gradient-accent: linear-gradient(135deg, #a5b4fc 0%, #f472b6 100%);
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navbar */
        .navbar {
            background-color: var(--bg-nav);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 16px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .nav-icon-btn:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .credits-pill {
            background: linear-gradient(90deg, rgba(217, 70, 239, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #d8b4fe;
            cursor: pointer;
        }

        .credits-icon {
            color: #d946ef;
        }

        .subscribe-btn {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--color-purple);
            color: #c084fc;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .subscribe-btn:hover {
            background: var(--color-purple);
            color: white;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            background: #9333ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* App Layout Container */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 80px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px 0;
            align-items: center;
            gap: 8px;
            overflow-y: auto;
        }

        .sidebar-item {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            gap: 6px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
            stroke-width: 2px;
        }

        .sidebar-item:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .sidebar-item.active {
            background-color: rgba(139, 92, 246, 0.12);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .new-badge {
            position: absolute;
            bottom: 4px;
            background-color: var(--color-green);
            color: #000;
            font-size: 8px;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Main Content Container */
        .main-content {
            flex: 1;
            display: flex;
            padding: 24px;
            gap: 24px;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        /* Left Control Panel */
        .left-panel {
            width: 360px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Tabs Container */
        .tabs-header {
            display: flex;
            background-color: var(--bg-input);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .tab-btn.active {
            background-color: #232530;
            color: var(--text-primary);
        }

        /* Text Input Block */
        .prompt-container {
            background-color: var(--bg-input);
            border-radius: 12px;
            padding: 12px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .prompt-container:focus-within {
            border-color: var(--color-purple);
        }

        .prompt-textarea {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            resize: none;
            outline: none;
            width: 100%;
            height: 80px;
        }

        .prompt-textarea::placeholder {
            color: var(--text-muted);
        }

        .prompt-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
        }

        .trash-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        .trash-btn:hover {
            color: #ef4444;
        }

        /* Styles Selection */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
        }

        .view-all {
            font-size: 12px;
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
        }

        .view-all:hover {
            text-decoration: underline;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .style-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .style-thumb {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: var(--transition);
            background-color: #232530;
        }

        .style-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .style-thumb.gradient-thumb {
            background: var(--gradient-accent);
        }

        .style-card.active .style-thumb {
            border-color: #818cf8;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.4);
        }

        .style-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
        }

        .style-card.active .style-name {
            color: var(--text-primary);
        }

        /* Duration Dropdown */
        .duration-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .dropdown {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: auto;
            /* Push generate button to the bottom */
            transition: var(--transition);
        }

        .dropdown:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Generate Button */
        .generate-btn {
            background: var(--gradient-primary);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
            margin-top: 20px;
        }

        .generate-btn:hover {
            opacity: 0.95;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        /* Right Preview Panel */
        .right-panel {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        /* Output header tabs */
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .output-tabs {
            display: flex;
            gap: 16px;
        }

        .output-tab {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .output-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }

        .output-filters {
            display: flex;
            background-color: var(--bg-input);
            padding: 3px;
            border-radius: 20px;
            gap: 2px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn.active {
            background-color: #232530;
            color: var(--text-primary);
        }

        /* Thumbnail Strip */
        .thumb-strip {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .thumb-item {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-item.active {
            border-color: var(--color-purple);
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
        }

        /* Main Image Viewer */
        .preview-container {
            flex: 1;
            position: relative;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .blurred-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
            opacity: 0.75;
            z-index: 1;
        }

        .main-preview-image {
            position: relative;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            z-index: 2;
        }

        .watermark {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 3;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Viewer Toolbar Controls */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-btn {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .tool-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
            background-color: #232530;
        }

        .btn-text {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            padding: 0 16px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-text:hover {
            background-color: #232530;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-accent {
            background-color: var(--color-blue);
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 0 16px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-accent:hover {
            background-color: #2563eb;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .btn-gradient {
            background: var(--gradient-primary);
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 0 16px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-gradient:hover {
            opacity: 0.95;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        /* Floating MediaAgent Widget */
        .agent-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: var(--transition);
        }

        .agent-widget:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        .agent-icon {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10b981;
            font-size: 12px;
            font-weight: 900;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #232530;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #323545;
        }
    </style>
</head>

<body>

    <!-- Top Navbar -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo-container">
                <div class="logo-icon">M</div>
                <span class="logo-text">Media.io</span>
            </div>
        </div>
        <div class="nav-right">
            <!-- Discord -->
            <button class="nav-icon-btn" aria-label="Discord">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path
                        d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.873-.894a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.92 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.099.244.2.372.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.894a.077.077 0 0 0-.041.107c.36 1.542.848 2.22 1.226 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.156-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.156-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.156 2.418z" />
                </svg>
            </button>

            <!-- Settings -->
            <button class="nav-icon-btn" aria-label="Settings">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </button>

            <!-- Notifications -->
            <button class="nav-icon-btn" aria-label="Notifications">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                    </path>
                </svg>
            </button>

            <!-- Gift -->
            <button class="nav-icon-btn" aria-label="Gifts">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7">
                    </path>
                </svg>
            </button>

            <!-- Credits -->
            <div class="credits-pill">
                <svg class="credits-icon" fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
                    <path fill-rule="evenodd"

            <!-- Left Control Panel -->
            <section class="left-panel">
                <h1 class="panel-title">Audio AI</h1>

                <div class="tabs-header">
                    <button class="tab-btn active">Text to Music</button>
                    <button class="tab-btn">AI Sound Effects</button>
                    <button class="tab-btn">Lyrics to Song</button>
                </div>

                <!-- Input area -->
                <div class="prompt-container">
                    <textarea class="prompt-textarea" placeholder="a heartfelt song">a heartfelt song</textarea>
                    <div class="prompt-footer">
                        <span>0/500</span>
                        <button class="trash-btn" aria-label="Delete prompt">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Styles selection -->
                <div class="section-header">
                    <h2 class="section-title">Styles</h2>
                    <a href="#" class="view-all">View All (32)</a>
                </div>

                <div class="style-grid">
                    <!-- General style -->
                    <div class="style-card active">
                        <div class="style-thumb gradient-thumb"></div>
                        <span class="style-name">General</span>
                    </div>

                    <!-- Hip Hop style -->
                    <div class="style-card">
                        <div class="style-thumb">
                            <img src="hip_hop.png" alt="Hip Hop Style">
                        </div>
                        <span class="style-name">Hip Hop</span>
                    </div>

                    <!-- Rock style -->
                    <div class="style-card">
                        <div class="style-thumb">
                            <img src="rock.png" alt="Rock Style">
                        </div>
                        <span class="style-name">Rock</span>
                    </div>

                    <!-- Acoustic style -->
                    <div class="style-card">
                        <div class="style-thumb">
                            <img src="acoustic.png" alt="Acoustic Style">
                        </div>
                        <span class="style-name">Acoustic</span>
                    </div>

                    <!-- Pop style -->
                    <div class="style-card">
                        <div class="style-thumb">
                            <img src="pop.png" alt="Pop Style">
                        </div>
                        <span class="style-name">Pop</span>
                    </div>
                </div>

                <!-- Duration dropdown -->
                <h3 class="duration-label">Duration</h3>
                <div class="dropdown">
                    <span>0:30</span>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

                <!-- Generate Button -->
                <button class="generate-btn">
                    <span>Generate</span>
                    <svg fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
                        <path fill-rule="evenodd"
                            d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"
                            clip-rule="evenodd"></path>
                    </svg>
                    <span>8</span>
                </button>
            </section>

            <!-- Right Preview Panel -->
            <section class="right-panel">
                <div class="output-header">
                    <div class="output-tabs">
                        <span class="output-tab active">Creations</span>
                        <span class="output-tab">Ideas Hub</span>
                    </div>

                    <div class="output-filters">
                        <button class="filter-btn active">All</button>

                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                            </svg>
                        </button>
                        <button class="filter-btn" aria-label="Videos">

                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Creations list thumb strip -->
                <div class="thumb-strip">
                    <div class="thumb-item active">
                        <img src="portrait.png" alt="Creation 1">
                    </div>
                    <div class="thumb-item">
                        <img src="portrait.png" style="filter: hue-rotate(90deg);" alt="Creation 2">
                    </div>
                    <div class="thumb-item">
                        <img src="portrait.png" style="filter: hue-rotate(180deg);" alt="Creation 3">

                    <div class="thumb-item">
                        <img src="portrait.png" style="filter: hue-rotate(270deg);" alt="Creation 4">

                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                        </button>
                        <button class="btn-text">Edit</button>
                        <button class="btn-accent">Animate</button>
                        <button class="btn-gradient">Upgrade</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Floating Chat Agent Widget -->
    <div class="agent-widget">
        <div class="agent-icon">☺</div>
        <span>MediaAgent</span>
